<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Photo Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  height: 100vh;
}

.popup-img {
  width: 650px;
  max-width: 90vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 8px;
}

.popup-button {
  font-size: 22px;
  padding: 6px 14px;
  margin: 6px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([54, -2], 5);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

const places = [
  {
    name: "York Minster",
    coords: [53.96195, -1.08197],
    text: "an Anglican cathedral, constructed between 1220 and 1472",
    photos: [
      "photos/minster-1.jpg",
      "photos/minster-2.jpg",
      "photos/minster-3.jpg",
      "photos/minster-4.jpg",
      "photos/minster-5.jpg",
      "photos/minster-6.jpg",
      "photos/minster-7.jpg",
      "photos/minster-8.jpg",
      "photos/minster-9.jpg",
      "photos/minster-10.jpg",
      "photos/minster-11.jpg"
    ]
  },
    {
    name: "Clifford's Tower",
    coords: [53.95561, -1.08017],
    text: "Remains of the Norman castle in York",
    photos: [
      "photos/clifford-1.jpg",
      "photos/clifford-2.jpg",
      "photos/clifford-3.jpg",
      "photos/clifford-4.jpg"
    ]
  },
   {
    name: "Tenby",
    coords: [51.672573, -4.695816],
    text: "a picturesque 12th-century seaside town",
    photos: [
      "photos/tenby-1.jpg",
      "photos/tenby-2.jpg",
      "photos/tenby-3.jpg",
      "photos/tenby-4.jpg",
      "photos/tenby-5.jpg",
      "photos/tenby-6.jpg",
      "photos/tenby-7.jpg",
      "photos/tenby-8.jpg",
      "photos/tenby-9.jpg",
      "photos/tenby-10.jpg"
    ]
  },
   {
    name: "Caerphilly Castle",
  coords: [51.5761, -3.2204],
  text: "One of Britain's largest medieval castles, built in the 13th century and renowned for its vast water defences, dramatic moat, and iconic leaning tower",
    photos: [
      "photos/caerfilly-1.jpg",
      "photos/caerfilly-2.jpg",
      "photos/caerfilly-3.jpg",
      "photos/caerfilly-4.jpg",
      "photos/caerfilly-5.jpg",
      "photos/caerfilly-6.jpg"
    ]
  }
];

const photoIndexes = {};

places.forEach((place, index) => {
  photoIndexes[index] = 0;

  const popupContent = `
    <b>${place.name}</b><br>
    ${place.text}<br><br>

    <img id="slide-${index}" src="${place.photos[0]}" class="popup-img"><br>

    <button class="popup-button" onclick="prevPhoto(${index})">◀</button>
    <span id="counter-${index}">1 / ${place.photos.length}</span>
    <button class="popup-button" onclick="nextPhoto(${index})">▶</button>
  `;

  L.marker(place.coords)
    .addTo(map)
    .bindPopup(popupContent, {
      maxWidth: 750
    });
});

function nextPhoto(index) {
  photoIndexes[index] =
    (photoIndexes[index] + 1) % places[index].photos.length;

  updatePhoto(index);
}

function prevPhoto(index) {
  photoIndexes[index] =
    (photoIndexes[index] - 1 + places[index].photos.length) %
    places[index].photos.length;

  updatePhoto(index);
}

function updatePhoto(index) {
  const photoIndex = photoIndexes[index];

  document.getElementById(`slide-${index}`).src =
    places[index].photos[photoIndex];

  document.getElementById(`counter-${index}`).textContent =
    `${photoIndex + 1} / ${places[index].photos.length}`;
}
</script>

</body>
</html>
