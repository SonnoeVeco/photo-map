<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Photo Map</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css">
  <link rel="stylesheet" href="https://unpkg.com/photoswipe@5/dist/photoswipe.css">
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="controls">
  <input id="searchBox" type="text" placeholder="Search place...">
  <select id="categoryFilter">
    <option value="All">All categories</option>
    <option value="Castle">Castles</option>
    <option value="Town">Towns</option>
    <option value="National Park">National Parks</option>
    <option value="Abbey">Abbeys</option>
    <option value="Aqueduct">Aqueducts</option>
    <option value="Viewpoint">Viewpoints</option>
    <option value="Church">Churches</option>
    <option value="Coast">Coasts & Beaches</option>
    <option value="Zoo">Zoos & Aquariums</option>
    <option value="Wildlife">Wildlife</option>
    <option value="Historic Architecture">Historic Architecture</option>
    <option value="National Landscape">National Landscape</option>
  </select>
</div>
<div id="map"></div>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="places.js"></script>
<script type="module" src="script.js"></script>
</body>
</html>
