<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Photo Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/glightbox/dist/css/glightbox.min.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  height: 100vh;
}

.popup-img {
  width: 320px;
  max-width: 100%;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 8px;
}

.hidden-gallery {
  display: none;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/glightbox/dist/js/glightbox.min.js"></script>

<script>
const map = L.map('map').setView([54, -2], 5);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);


// ===== LOCATIONS =====

const places = [
  {
    name: "York Minster",
    coords: [53.96195, -1.08197],
    text: "York Minster and old city centre.",
    photos: [
      "photos/york.jpg",
      "photos/york2.jpg",
      "photos/york3.jpg"
    ]
  },

  {
    name: "Clifford's Tower",
    coords: [53.95561, -1.08017],
    text: "Remains of the Norman castle in York.",
    photos: [
      "photos/clifford1.jpg",
      "photos/clifford2.jpg"
    ]
  },

  {
    name: "The Shambles",
    coords: [53.95759, -1.08025],
    text: "Medieval street in York.",
    photos: [
      "photos/shambles1.jpg",
      "photos/shambles2.jpg"
    ]
  }
];


// ===== CREATE MARKERS =====

places.forEach((place, index) => {

  const galleryName = `gallery-${index}`;

  let galleryLinks = "";

  place.photos.forEach((photo, photoIndex) => {
    galleryLinks += `
      <a href="${photo}"
         class="glightbox ${photoIndex === 0 ? "" : "hidden-gallery"}"
         data-gallery="${galleryName}"
         data-title="${place.name}"
         data-description="${place.text}">
        ${photoIndex === 0
          ? `<img src="${photo}" class="popup-img">`
          : ""}
      </a>
    `;
  });

  const popupContent = `
    <b>${place.name}</b><br>
    ${place.text}<br>
    ${galleryLinks}
    <br><small>Click photo to open gallery</small>
  `;

  L.marker(place.coords)
    .addTo(map)
    .bindPopup(popupContent, {
      maxWidth: 380
    });
});


// ===== LIGHTBOX =====

let lightbox = GLightbox({
  selector: ".glightbox",
  touchNavigation: true,
  loop: true,
  zoomable: true
});

map.on("popupopen", function() {
  lightbox.reload();
});
</script>

</body>
</html>
