<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Photo Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

#map {
  height: 100vh;
}

.popup-img {
  width: 650px;
  max-width: 90vw;
  max-height: 70vh;
  object-fit: contain;
  border-radius: 8px;
}

.popup-button {
  font-size: 22px;
  padding: 6px 14px;
  margin: 6px;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([54, -2], 5);

L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '© OpenStreetMap'
}).addTo(map);

const places = [
  {
    name: "York Minster",
    coords: [53.96195, -1.08197],
    text: "York Minster and old city centre.",
    photos: [
      "photos/york.jpg",
      "photos/york2.jpg",
      "photos/york3.jpg"
    ]
  }
];

const photoIndexes = {};

places.forEach((place, index) => {
  photoIndexes[index] = 0;

  const popupContent = `
    <b>${place.name}</b><br>
    ${place.text}<br><br>

    <img id="slide-${index}" src="${place.photos[0]}" class="popup-img"><br>

    <button class="popup-button" onclick="prevPhoto(${index})">◀</button>
    <span id="counter-${index}">1 / ${place.photos.length}</span>
    <button class="popup-button" onclick="nextPhoto(${index})">▶</button>
  `;

  L.marker(place.coords)
    .addTo(map)
    .bindPopup(popupContent, {
      maxWidth: 750
    });
});

function nextPhoto(index) {
  photoIndexes[index] =
    (photoIndexes[index] + 1) % places[index].photos.length;

  updatePhoto(index);
}

function prevPhoto(index) {
  photoIndexes[index] =
    (photoIndexes[index] - 1 + places[index].photos.length) %
    places[index].photos.length;

  updatePhoto(index);
}

function updatePhoto(index) {
  const photoIndex = photoIndexes[index];

  document.getElementById(`slide-${index}`).src =
    places[index].photos[photoIndex];

  document.getElementById(`counter-${index}`).textContent =
    `${photoIndex + 1} / ${places[index].photos.length}`;
}
</script>

</body>
</html>
